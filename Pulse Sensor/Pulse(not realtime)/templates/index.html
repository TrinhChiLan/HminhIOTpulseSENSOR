<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Heart Monitor</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="../static/style.css">
    </head>

    <body>
        <div id="login-overlay" class="overlay">
            <div class="login-card">
                <img src="../assets/logo.png" alt="Logo" class="login-logo">
                <h2>Welcome</h2>
                <p>Enter your phone number to start recording</p>
                <input type="text" id="phone-input" placeholder="Phone Number (e.g. 0912345678)">
                <button onclick="login()">Login / Start</button>
            </div>
        </div>

        <div class="main-content">
            <div class="layout-wrapper">
                <div class="left-column">
                    <div class="top-bar">
                        <img src="../assets/logo.png" alt="Logo" class="main-logo">
                        <div class="user-info">
                            <span id="user-display">--</span>
                            <button class="logout-btn" onclick="logout()">Logout</button>
                        </div>
                    </div>
                    
                    <div class="history-section">
                        <h3>Recording History</h3>
                        <div id="history-list" class="history-list">
                            <p>Loading history...</p>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div class="dashboard" id="dashboard-area">
                        <div id="completion-banner" class="completion-banner" style="display:none;">
                            <span>Reading Complete! Data saved. You may remove your finger.</span>
                        </div>
                        
                        <div id="sensor-overlay" class="sensor-overlay">
                            <div class="sensor-overlay-content">
                                <h3 id="sensor-status-title">Waiting for Sensor...</h3>
                                <p id="sensor-status-desc" style="color: #666;">Please place your finger on the sensor.</p>
                                <div id="sensor-progress-bar" class="progress-bar-container" style="display:none;">
                                    <div id="sensor-progress" class="progress-bar"></div>
                                </div>
                            </div>
                        </div>

                        <div class="metrics-row">
                            <div class="metrics-card">
                                <div class="metrics-header">
                                    <div class="metrics-label">Heart Rate</div>
                                    <div class="live-indicator" id="live-indicator" style="display:none;">● LIVE</div>
                                </div>
                                <div class="metric-value"><span id="bpm">--</span></div>
                            </div>

                            <div class="metrics-card">
                                <div class="metrics-header">
                                    <div class="metrics-label">SpO2 Level</div>
                                </div>
                                <div class="metric-value"><span id="spo2">--</span><span class="unit">%</span></div>
                            </div>
                        </div>

                        <div class="charts-column">
                            <div class="chart-container">
                                <div class="chart-title">Heart Rate (BPM)</div>
                                <canvas id="chart"></canvas>
                            </div>
                            <div class="chart-container">
                                <div class="chart-title">SpO2 Level (%)</div>
                                <canvas id="spo2-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="../static/script.js"></script>
    </body>
</html>
